<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#f5c518" stroke-width="3" opacity="0.6"/>
  <!-- Inner filled circle -->
  <circle cx="50" cy="50" r="38" fill="#000000" opacity="0.75"/>
  <!-- Info "i" symbol -->
  <text x="50" y="36" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#f5c518" text-anchor="middle" dominant-baseline="middle">i</text>
  <!-- Dot above "i" -->
  <circle cx="50" cy="55" r="2.5" fill="#f5c518"/>
  <!-- Vertical bar of "i" -->
  <rect x="47.5" y="58" width="5" height="16" rx="2" fill="#f5c518"/>
</svg>
